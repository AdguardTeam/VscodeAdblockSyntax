---
version: 2
plan:
  project-key: AJL
  key: VSCODEADBLOCKSYNTAXTEST
  name: vscode adblock syntax - tests
variables:
  dockerNode: adguard/node-ssh:22.14--0

stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Build:
  key: BUILD
  docker:
    image: '${bamboo.dockerNode}'
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            ls -laht

            # Set cache directory
            pnpm config set store-dir ${bamboo.cachePnpm}

            # Install dependencies
            pnpm install

            # Build shared library first (required by client and server)
            pnpm --filter @vscode-adblock-syntax/shared build

            # Check TypeScript types
            pnpm test:compile

            # Run markdownlint
            pnpm lint:md

            # Run ESLint
            pnpm lint:code

            # Run Vitest tests
            pnpm test

            # Build extension
            pnpm build

            # Package build into .vsix file
            pnpm package

            # Show tree of files in .vsix file
            pnpm exec vsce ls --tree
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh out/vscode-adblock.vsix"
  artifacts:
    - name: vscode-adblock-vsix
      pattern: out/vscode-adblock.vsix
      shared: true
      required: false
  requirements:
    - adg-docker: true

branches:
  create: for-pull-request
  delete:
    after-deleted-days: '1'
    after-inactive-days: '5'
  link-to-jira: true

notifications:
  - events:
      - plan-status-changed
    recipients:
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo

labels: []
other:
  concurrent-build-plugin: system-default
